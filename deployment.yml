apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccit-app
spec:
  replicas: 10
  selector:
    matchLabels:
      app: ccit-app
  template:
    metadata:
      labels:
        app: ccit-app
    spec:
      containers:
      - name: cont-1
        image: cloudintelugu/ccitimage:v2
        ports:
        - containerPort: 80
